<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JuvenArt & FestMirim 2026 — Dashboard de Respostas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    /* ═══════════════════════════════════════
       VARIÁVEIS
       ═══════════════════════════════════════ */
    :root {
      --bordô:       #6B1A27;
      --bordô-deep:  #4A0F1A;
      --bordô-glow:  rgba(107,26,39,0.18);
      --ouro:        #C9962C;
      --ouro-light:  #F2CD7A; /* Ouro mais claro/brilhante */
      --verde:       #2D5C3A;
      --verde-light: #3D7A50;
      --bg:          #0F0A08;
      --bg2:         #180E0B;
      --bg3:         #1E1410;
      --surface:     #2A1C14; /* Fundo dos cards levemente mais claro */
      --surface2:    #2C1E14;
      --borda:       rgba(201,150,44,0.30); /* Bordas mais visíveis */
      --borda-hover: rgba(201,150,44,0.60);
      --texto:       #FFFFFF; /* Texto principal branco puro */
      --texto-dim:   rgba(255,255,255,0.75); /* Texto secudário mais legível */
      --texto-muted: rgba(255,255,255,0.50);

      --fonte-display: 'Cormorant Garamond', Georgia, serif;
      --fonte-corpo:   'Raleway', sans-serif;
      --raio: 14px;
      --trans: all 0.3s cubic-bezier(0.4,0,0.2,1);
    
      /* Paleta de gráficos */
      --c1: #C9962C; --c2: #6B1A27; --c3: #2D5C3A;
      --c4: #7B4F1C; --c5: #3D5C6B; --c6: #8B4513;
      --c7: #5C3D6B; --c8: #1A6B4A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--fonte-corpo);
      background-color: var(--bg);
      color: var(--texto);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(107,26,39,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 85% 100%,  rgba(201,150,44,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 50% 50%,   rgba(45,92,58,0.05)  0%, transparent 60%);
    }

    /* ═══════════════════════════════════════
       TOPBAR
       ═══════════════════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(15,10,8,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--borda);
      padding: 0 32px;
    }
    .topbar-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; gap: 20px;
      height: 60px;
    }
    .topbar-logo {
      font-family: var(--fonte-display);
      font-size: 22px; font-weight: 700;
      color: var(--texto);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .topbar-logo span { color: var(--ouro-light); font-style: italic; }
    .topbar-divider {
      width: 1px; height: 22px;
      background: var(--borda); flex-shrink: 0;
    }
    .topbar-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--texto-dim);
    }
    .topbar-spacer { flex: 1; }

    /* Botão de atualizar */
    .btn-refresh {
      display: flex; align-items: center; gap: 8px;
      background: transparent;
      border: 1px solid var(--borda-hover);
      color: var(--ouro-light);
      font-family: var(--fonte-corpo);
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 8px 18px; border-radius: 100px;
      cursor: pointer; transition: var(--trans);
    }
    .btn-refresh:hover {
      background: rgba(201,150,44,0.08);
      border-color: var(--ouro);
    }
    .btn-refresh.loading .icon-refresh { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .last-update {
      font-size: 10px; color: var(--texto-muted);
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════
       HERO STRIP
       ═══════════════════════════════════════ */
    .hero-strip {
      background: linear-gradient(135deg, var(--bordô-deep) 0%, var(--bordô) 60%, #8B2535 100%);
      padding: 40px 32px 36px;
      position: relative; overflow: hidden;
    }
    .hero-strip::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        -45deg, transparent, transparent 20px,
        rgba(255,255,255,0.02) 20px, rgba(255,255,255,0.02) 21px
      );
    }
    .hero-strip::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px; border-radius: 50%;
      border: 1px solid rgba(201,150,44,0.15);
      right: -160px; top: -200px;
      pointer-events: none;
    }
    .hero-strip-inner {
      max-width: 1200px; margin: 0 auto;
      position: relative; z-index: 1;
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 24px;
    }
    .hero-title {
      font-family: var(--fonte-display);
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 700; line-height: 1;
      color: #fff;
    }
    .hero-title span { color: var(--ouro-light); font-style: italic; }
    .hero-sub {
      font-size: 12px; font-weight: 400; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }
    .hero-border {
      height: 4px;
      background: linear-gradient(90deg, var(--bordô-deep), var(--ouro), var(--verde), var(--ouro), var(--bordô-deep));
    }

    /* ═══════════════════════════════════════
       KPI CARDS
       ═══════════════════════════════════════ */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 1200px; margin: 0 auto;
      padding: 32px 32px 0;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 22px 24px;
      position: relative; overflow: hidden;
      transition: var(--trans);
      animation: fadeUp 0.4s ease both;
    }
    .kpi-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--ouro), transparent);
    }
    .kpi-card:hover {
      border-color: var(--borda-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .kpi-icon {
      font-size: 20px; margin-bottom: 10px; display: block;
    }
    .kpi-value {
      font-family: var(--fonte-display);
      font-size: 42px; font-weight: 700; line-height: 1;
      color: var(--ouro-light);
    }
    .kpi-label {
      font-size: 10px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: var(--texto-dim);
      margin-top: 6px;
    }

    /* ═══════════════════════════════════════
       GRID DE GRÁFICOS
       ═══════════════════════════════════════ */
    .charts-grid {
      max-width: 1200px; margin: 0 auto;
      padding: 28px 32px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* Card que ocupa coluna inteira */
    .chart-card.full { grid-column: 1 / -1; }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      overflow: hidden;
      transition: var(--trans);
      animation: fadeUp 0.5s ease both;
    }
    .chart-card:hover {
      border-color: var(--borda-hover);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    }

    .chart-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--borda);
    }
    .chart-q-num {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--ouro);
      margin-bottom: 3px;
    }
    .chart-q-text {
      font-family: var(--fonte-display);
      font-size: 17px; font-weight: 600; line-height: 1.3;
      color: var(--texto);
    }
    .chart-type-badge {
      flex-shrink: 0;
      background: rgba(201,150,44,0.1);
      border: 1px solid rgba(201,150,44,0.2);
      color: var(--ouro-light);
      font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px;
    }

    .chart-body {
      padding: 20px 22px;
      position: relative;
    }

    /* Container do canvas com altura fixa */
    .canvas-wrap {
      position: relative;
      height: 220px;
    }
    .canvas-wrap.tall { height: 280px; }

    /* Legenda customizada */
    .custom-legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 16px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--texto-dim);
    }
    .legend-dot {
      width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0;
    }

    /* Barras de progresso (texto livre / escala) */
    .bar-list { display: flex; flex-direction: column; gap: 12px; }
    .bar-row { display: flex; flex-direction: column; gap: 5px; }
    .bar-meta {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .bar-label {
      font-size: 12px; color: var(--texto-dim);
      max-width: 80%; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .bar-pct {
      font-family: var(--fonte-display);
      font-size: 15px; font-weight: 600; color: var(--ouro-light);
    }
    .bar-track {
      height: 6px; background: rgba(255,255,255,0.07);
      border-radius: 6px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 6px;
      background: linear-gradient(to right, var(--ouro), var(--ouro-light));
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    /* Tabela de CTGs */
    .ctg-table { width: 100%; border-collapse: collapse; }
    .ctg-table th, .ctg-table td {
      padding: 10px 14px; text-align: left;
      border-bottom: 1px solid var(--borda);
      font-size: 12px;
    }
    .ctg-table th {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--ouro);
      background: rgba(201,150,44,0.05);
    }
    .ctg-table td { color: var(--texto-dim); }
    .ctg-table tr:last-child td { border-bottom: none; }
    .ctg-table tr:hover td { color: var(--texto); background: rgba(255,255,255,0.02); }

    /* ═══════════════════════════════════════
       ESTADO VAZIO / LOADING
       ═══════════════════════════════════════ */
    .state-box {
      max-width: 1200px; margin: 0 auto;
      padding: 32px;
    }
    .state-inner {
      background: var(--surface);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 60px 32px;
      text-align: center;
    }
    .state-icon { font-size: 40px; margin-bottom: 16px; }
    .state-title {
      font-family: var(--fonte-display);
      font-size: 26px; font-weight: 600; color: var(--texto);
      margin-bottom: 8px;
    }
    .state-desc { font-size: 13px; color: var(--texto-dim); line-height: 1.6; }
    .state-desc code {
      background: rgba(201,150,44,0.1);
      color: var(--ouro-light);
      padding: 2px 8px; border-radius: 4px;
      font-family: monospace; font-size: 12px;
    }

    /* Loading spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--borda);
      border-top-color: var(--ouro);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    /* ═══════════════════════════════════════
       ANIMAÇÕES
       ═══════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.10s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.20s; }

    /* ═══════════════════════════════════════
       RESPONSIVIDADE
       ═══════════════════════════════════════ */
    @media (max-width: 700px) {
      .topbar          { padding: 0 16px; }
      .hero-strip      { padding: 28px 16px 24px; }
      .kpi-row         { padding: 20px 16px 0; }
      .charts-grid     { padding: 20px 16px 40px; gap: 14px; }
      .kpi-value       { font-size: 34px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     TOPBAR
     ════════════════════════════════════════════ -->
<nav class="topbar">
  <div class="topbar-inner">
    <span class="topbar-logo">Juven<span>Art</span> & Fest<span>Mirim</span></span>
    <div class="topbar-divider"></div>
    <span class="topbar-label">Dashboard · 2026</span>
    <div class="topbar-spacer"></div>
    <span class="last-update" id="last-update"></span>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
      <svg class="icon-refresh" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Atualizar
    </button>
  </div>
</nav>

<!-- ════════════════════════════════════════════
     HERO
     ════════════════════════════════════════════ -->
<div class="hero-strip">
  <div class="hero-strip-inner">
    <div>
      <h1 class="hero-title">Painel de <span>Resultados</span></h1>
      <p class="hero-sub">Pesquisa de Opinião · Categorias Mirim e Juvenil</p>
    </div>
  </div>
</div>
<div class="hero-border"></div>

<!-- ════════════════════════════════════════════
     CONTEÚDO DINÂMICO
     ════════════════════════════════════════════ -->
<div id="app-content"></div>


<!-- ════════════════════════════════════════════
     JAVASCRIPT PRINCIPAL
     ════════════════════════════════════════════ -->
<script>
/* ══════════════════════════════════════════════════════════════
   ★  CONFIGURAÇÃO — EDITE APENAS ESTE BLOCO  ★
   ══════════════════════════════════════════════════════════════

   1. Cole a URL do seu Apps Script Web App abaixo (mesma do formulário,
      mas o novo doGet() já está incluso no código no final deste arquivo).

   2. Em QUESTIONS_CONFIG, descreva cada pergunta que você criou no formulário:
      - key:   nome do campo (name="...") usado no HTML do formulário
      - label: texto curto para aparecer no dashboard
      - type:  'pie' | 'bar' | 'horizontal' | 'scale' | 'text'
               pie        → gráfico de pizza (radio/select de poucas opções)
               bar        → barras verticais (radio/select)
               horizontal → barras horizontais (bom para textos longos)
               scale      → média visual da escala 1-5
               text       → nuvem de respostas / lista de textos livres

   ══════════════════════════════════════════════════════════════ */

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUjgnoH4PqI5yFlgWW9-CZ64Iw0tGVMq8VzUomKGytEQEyQNwqXE9QrSjee9hdegbvxA/exec';

  const QUESTIONS_CONFIG = [
    // Identificação — aparecem na tabela de CTGs, não como gráfico
    { key: 'ctg_nome',   label: 'CTG',        type: 'identity' },
    { key: 'ctg_cidade', label: 'Município',   type: 'identity' },
    { key: 'ctg_regiao', label: 'Região MTG',  type: 'identity' },

    // ★ Substitua abaixo pelas suas perguntas reais ★
    { key: 'q1', label: '[Pergunta 1]',  type: 'pie' },
    { key: 'q2', label: '[Pergunta 2]',  type: 'bar' },
    { key: 'q3', label: '[Pergunta 3]',  type: 'horizontal' },
    { key: 'q4', label: '[Pergunta 4]',  type: 'scale' },
    { key: 'q5', label: '[Pergunta 5]',  type: 'scale' },
    { key: 'q6', label: '[Pergunta 6]',  type: 'pie' },
    { key: 'q7', label: '[Pergunta 7]',  type: 'text' },
  ];
/* ══════════════════════════════════════════════════════════════
   FIM DA CONFIGURAÇÃO
   ══════════════════════════════════════════════════════════════ */


  // Paleta de cores para gráficos
  // Paleta de cores para gráficos (Mais vibrantes para Dark Mode)
  const PALETTE = [
    '#F2CD7A', '#D96877', '#6E9C7C', '#C9962C',
    '#7AB0C2', '#E2976D', '#A284B3', '#52A889',
    '#C4755C', '#84A884'
  ];
  const PALETTE_ALPHA = PALETTE.map(c => c + 'CC');

  let chartInstances = {};

  /* ── Carrega dados via Apps Script ────────────────────────── */
  async function loadData() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('loading');
    renderLoading();

    try {
      const res  = await fetch(APPS_SCRIPT_URL + '?action=getData');
      const json = await res.json();

      if (!json.rows || json.rows.length === 0) {
        renderEmpty();
      } else {
        renderDashboard(json.headers, json.rows);
      }

      document.getElementById('last-update').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    } catch (err) {
      renderError(err);
    } finally {
      btn.classList.remove('loading');
    }
  }

  /* ── Estados de UI ─────────────────────────────────────────── */
  function renderLoading() {
    document.getElementById('app-content').innerHTML = `
      <div class="state-box">
        <div class="state-inner">
          <div class="spinner"></div>
          <div class="state-title">Carregando dados…</div>
          <p class="state-desc">Buscando respostas na planilha do Google Sheets.</p>
        </div>
      </div>`;
  }

  function renderEmpty() {
    document.getElementById('app-content').innerHTML = `
      <div class="state-box">
        <div class="state-inner">
          <div class="state-icon">📋</div>
          <div class="state-title">Nenhuma resposta ainda</div>
          <p class="state-desc">Assim que os primeiros CTGs enviarem o formulário,<br>os gráficos aparecerão aqui automaticamente.</p>
        </div>
      </div>`;
  }

  function renderError(err) {
    document.getElementById('app-content').innerHTML = `
      <div class="state-box">
        <div class="state-inner">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Não foi possível conectar</div>
          <p class="state-desc">
            Verifique se a URL do Apps Script está correta na variável
            <code>APPS_SCRIPT_URL</code> e se o deploy está ativo.<br><br>
            Erro: <code>${err.message}</code>
          </p>
        </div>
      </div>`;
  }

  /* ── Renderiza o dashboard completo ───────────────────────── */
  function renderDashboard(headers, rows) {
    // Destrói gráficos anteriores
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};

    // Monta objeto { coluna: [valores] }
    const colData = {};
    headers.forEach(h => colData[h] = []);
    rows.forEach(row => {
      headers.forEach((h, i) => colData[h].push(row[i] ?? ''));
    });

    const total      = rows.length;
    const totalCtgs  = new Set(colData['ctg_nome'] || []).size;
    const totalCid   = new Set(colData['ctg_cidade'] || []).size;
    
    // Tratamento robusto da Data ISO do Google Sheets
    const timestampArray = colData['timestamp'] || [];
    let formattedLastDate = '—';
    if (timestampArray.length > 0) {
      const rawDate = timestampArray[timestampArray.length - 1];
      const d = new Date(rawDate);
      if (!isNaN(d.getTime())) {
        formattedLastDate = d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
      } else {
        formattedLastDate = String(rawDate).split(' ')[0];
      }
    }

    // ── KPIs ──
    const kpiHtml = `
      <div class="kpi-row">
        <div class="kpi-card">
          <span class="kpi-icon">📩</span>
          <div class="kpi-value">${total}</div>
          <div class="kpi-label">Respostas recebidas</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">🏠</span>
          <div class="kpi-value">${totalCtgs}</div>
          <div class="kpi-label">CTGs participantes</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">📍</span>
          <div class="kpi-value">${totalCid}</div>
          <div class="kpi-label">Municípios</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">🕐</span>
          <div class="kpi-value" style="font-size:18px; margin-top:8px;">${formattedLastDate}</div>
          <div class="kpi-label">Última resposta</div>
        </div>
      </div>`;

    // ── Tabela de CTGs ──
    const identityKeys = QUESTIONS_CONFIG.filter(q => q.type === 'identity').map(q => q.key);
    const ctgRows = rows.map(row => {
      return identityKeys.map(k => {
        const idx = headers.indexOf(k);
        return idx >= 0 ? row[idx] : '—';
      });
    });
    const ctgTableHtml = `
      <div class="chart-card full" style="animation-delay:0.05s">
        <div class="chart-header">
          <div>
            <div class="chart-q-num">Identificação</div>
            <div class="chart-q-text">Entidades participantes</div>
          </div>
          <span class="chart-type-badge">Tabela</span>
        </div>
        <div class="chart-body" style="overflow-x:auto; padding:0">
          <table class="ctg-table">
            <thead><tr>
              ${QUESTIONS_CONFIG.filter(q=>q.type==='identity').map(q=>`<th>${q.label}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${ctgRows.map(r=>`<tr>${r.map(c=>`<td>${c||'—'}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;

    // ── Cards de gráfico por questão ──
    const questionConfigs = QUESTIONS_CONFIG.filter(q => q.type !== 'identity');
    let chartsHtml = questionConfigs.map((q, idx) => {
      return buildChartCardHtml(q, idx, headers, colData, total);
    }).join('');

    // Monta HTML
    document.getElementById('app-content').innerHTML = `
      ${kpiHtml}
      <div class="charts-grid">
        ${ctgTableHtml}
        ${chartsHtml}
      </div>`;

    // Inicializa gráficos após render
    requestAnimationFrame(() => {
      questionConfigs.forEach((q, idx) => {
        initChart(q, idx, headers, colData, total);
      });
    });
  }

  /* ── Monta HTML do card (sem o canvas inicializado) ─────── */
  function buildChartCardHtml(q, idx, headers, colData, total) {
    const delay   = 0.05 + idx * 0.04;
    const typeMap = { pie:'Pizza', bar:'Barras', horizontal:'Horizontal', scale:'Escala', text:'Texto livre' };
    const badge   = typeMap[q.type] || q.type;
    const qNum    = `Q${idx + 1}`;

    if (q.type === 'scale') {
      return `
        <div class="chart-card" style="animation-delay:${delay}s">
          <div class="chart-header">
            <div>
              <div class="chart-q-num">${qNum}</div>
              <div class="chart-q-text">${q.label}</div>
            </div>
            <span class="chart-type-badge">${badge}</span>
          </div>
          <div class="chart-body">
            <div id="scale-${idx}" class="bar-list"></div>
          </div>
        </div>`;
    }

    if (q.type === 'text') {
      return `
        <div class="chart-card" style="animation-delay:${delay}s">
          <div class="chart-header">
            <div>
              <div class="chart-q-num">${qNum}</div>
              <div class="chart-q-text">${q.label}</div>
            </div>
            <span class="chart-type-badge">${badge}</span>
          </div>
          <div class="chart-body">
            <div id="text-${idx}" class="bar-list"></div>
          </div>
        </div>`;
    }

    const tall = q.type === 'horizontal' ? 'tall' : '';
    const full = q.type === 'horizontal' ? '' : '';

    return `
      <div class="chart-card ${full}" style="animation-delay:${delay}s">
        <div class="chart-header">
          <div>
            <div class="chart-q-num">${qNum}</div>
            <div class="chart-q-text">${q.label}</div>
          </div>
          <span class="chart-type-badge">${badge}</span>
        </div>
        <div class="chart-body">
          <div class="canvas-wrap ${tall}">
            <canvas id="chart-${idx}"></canvas>
          </div>
          <div class="custom-legend" id="legend-${idx}"></div>
        </div>
      </div>`;
  }

  /* ── Inicializa Chart.js para cada questão ─────────────── */
  function initChart(q, idx, headers, colData, total) {
    const colIdx  = headers.indexOf(q.key);
    if (colIdx < 0) return;

    const values  = colData[q.key].filter(v => v && v.trim());

    // ── Escala 1-5 ──
    if (q.type === 'scale') {
      const nums   = values.map(Number).filter(n => !isNaN(n) && n >= 1 && n <= 5);
      const avg    = nums.length ? (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1) : '—';
      const counts = [1,2,3,4,5].map(n => nums.filter(v=>v===n).length);
      const el     = document.getElementById(`scale-${idx}`);
      if (!el) return;
      const maxCount = Math.max(...counts, 1);
      el.innerHTML = `
        <div style="text-align:center; margin-bottom:16px;">
          <span style="font-family:var(--fonte-display);font-size:52px;font-weight:700;color:var(--ouro-light);">${avg}</span>
          <span style="font-size:12px;color:var(--texto-muted);display:block;margin-top:-4px;">média de ${nums.length} respostas</span>
        </div>
        ${[1,2,3,4,5].map((n,i)=>`
          <div class="bar-row">
            <div class="bar-meta">
              <span class="bar-label">★ ${n}</span>
              <span class="bar-pct">${counts[i]}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${(counts[i]/maxCount)*100}%;background:linear-gradient(to right,var(--ouro),var(--ouro-light))"></div>
            </div>
          </div>`).join('')}`;
      return;
    }

    // ── Texto livre ──
    if (q.type === 'text') {
      const el = document.getElementById(`text-${idx}`);
      if (!el) return;
      if (!values.length) {
        el.innerHTML = '<p style="color:var(--texto-muted);font-size:12px;">Nenhuma resposta ainda.</p>';
        return;
      }
      el.innerHTML = values.slice(0, 10).map(v => `
        <div style="background:rgba(255,255,255,0.04);border:1px solid var(--borda);
                    border-radius:8px;padding:10px 14px;font-size:12px;
                    color:var(--texto-dim);line-height:1.5;">
          "${v}"
        </div>`).join('');
      return;
    }

    // ── Contagem de opções (pizza / barras) ──
    const freq = {};
    values.forEach(v => {
      // Trata checkbox com múltiplos valores separados por "; "
      v.split('; ').forEach(part => {
        const k = part.trim();
        if (k) freq[k] = (freq[k] || 0) + 1;
      });
    });

    const labels  = Object.keys(freq);
    const counts  = Object.values(freq);
    const bgColors = PALETTE.slice(0, labels.length);

    const canvas = document.getElementById(`chart-${idx}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // Opções base
    const baseOpts = {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const pct = ((ctx.parsed / (q.type === 'pie' ? counts.reduce((a,b)=>a+b,0) : Math.max(...counts))) * 100).toFixed(1);
              return ` ${ctx.label}: ${ctx.raw} resp. (${pct}%)`;
            }
          },
          backgroundColor: '#1E1410',
          borderColor: 'rgba(201,150,44,0.3)',
          borderWidth: 1,
          titleColor: '#E8C46A',
          bodyColor: '#F5EDD8',
          padding: 10,
        }
      }
    };

    if (q.type === 'pie') {
      chartInstances[idx] = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: counts, backgroundColor: bgColors, borderColor: '#1E1410', borderWidth: 2, hoverOffset: 6 }] },
        options: { ...baseOpts, cutout: '58%' }
      });
    } else {
      const isHoriz = q.type === 'horizontal';
      chartInstances[idx] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: counts,
            backgroundColor: bgColors,
            borderColor: bgColors.map(c => c + 'FF'),
            borderWidth: 0,
            borderRadius: 5,
          }]
        },
        options: {
          ...baseOpts,
          indexAxis: isHoriz ? 'y' : 'x',
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: 'rgba(245,237,216,0.45)', font: { family: 'Raleway', size: 11 } }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { color: 'rgba(245,237,216,0.45)', font: { family: 'Raleway', size: 11 } }
            }
          }
        }
      });
    }

    // Legenda customizada
    const legendEl = document.getElementById(`legend-${idx}`);
    if (legendEl) {
      legendEl.innerHTML = labels.map((l, i) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${bgColors[i]}"></div>
          <span>${l} <strong style="color:var(--ouro-light)">${counts[i]}</strong></span>
        </div>`).join('');
    }
  }

  // Carrega ao abrir
  loadData();
</script>
</body>
</html>
