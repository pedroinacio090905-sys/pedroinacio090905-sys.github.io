<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - JuvenArt & FestMirim 2026</title>
  
  <link rel="icon" type="image/png" href="favicon.png?v=2" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ════════════════════════════════════════════
       VARIÁVEIS DE TEMA (DARK MODE VIBRANTE)
       ════════════════════════════════════════════ */
    :root {
      --bordô:       #6B1A27;
      --bordô-deep:  #4A0F1A;
      --bordô-glow:  rgba(107,26,39,0.18);
      --ouro:        #C9962C;
      --ouro-light:  #F2CD7A; 
      --verde:       #2D5C3A;
      --verde-light: #3D7A50;
      --bg:          #0F0A08;
      --bg2:         #180E0B;
      --bg3:         #1E1410;
      --surface:     #2A1C14; 
      --surface2:    #2C1E14;
      --borda:       rgba(201,150,44,0.30); 
      --borda-hover: rgba(201,150,44,0.60);
      --texto:       #FFFFFF; 
      --texto-dim:   rgba(255,255,255,0.75); 
      --texto-muted: rgba(255,255,255,0.50);

      --fonte-display: 'Cormorant Garamond', Georgia, serif;
      --fonte-corpo:   'Raleway', sans-serif;
      --raio: 14px;
      --trans: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--texto);
      font-family: var(--fonte-corpo);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════════════
       TOPBAR & HERO
       ════════════════════════════════════════════ */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--borda);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .topbar-logo {
      font-family: var(--fonte-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--texto);
      letter-spacing: 0.5px;
    }
    .topbar-logo span { color: var(--ouro-light); font-style: italic; }
    .topbar-divider { width: 1px; height: 24px; background: var(--borda); }
    .topbar-label { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--texto-muted); }
    .topbar-spacer { flex: 1; }
    
    .last-update {
      font-size: 12px;
      color: var(--texto-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-refresh {
      background: transparent;
      border: 1px solid var(--borda);
      color: var(--ouro-light);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: var(--fonte-corpo);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--trans);
    }
    .btn-refresh:hover { background: var(--borda); color: var(--texto); }

    .hero-strip {
      background: linear-gradient(to right, var(--bg3), var(--bg2));
      padding: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .hero-strip-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .hero-title {
      font-family: var(--fonte-display);
      font-size: 32px;
      font-weight: 600;
      color: var(--texto);
    }
    .hero-title span { color: var(--ouro-light); font-style: italic; }
    .hero-sub {
      font-size: 13px;
      color: var(--texto-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .hero-border {
      height: 2px;
      background: linear-gradient(90deg, var(--bordô), var(--ouro), var(--verde), var(--bg));
      opacity: 0.5;
    }

    /* ════════════════════════════════════════════
       LAYOUT & CARDS
       ════════════════════════════════════════════ */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
    }

    /* KPIs */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 24px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--ouro), transparent); opacity: 0.5;
    }
    .kpi-icon { font-size: 20px; margin-bottom: 12px; opacity: 0.8; }
    .kpi-value {
      font-family: var(--fonte-display);
      font-weight: 700;
      color: var(--ouro-light);
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-muted);
    }

    /* Gráficos */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 24px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chart-title-area { flex: 1; padding-right: 16px; }
    .chart-q-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--ouro);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .chart-q-text {
      font-family: var(--fonte-display);
      font-weight: 600;
      color: var(--texto);
      line-height: 1.3;
    }
    .chart-type-badge {
      background: rgba(201,150,44,0.1);
      border: 1px solid var(--borda);
      color: var(--ouro-light);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
    }
    .chart-body {
      flex: 1;
      position: relative;
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Custom Legends */
    .custom-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed rgba(255,255,255,0.05);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--texto-dim);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .legend-val { font-weight: 700; color: var(--texto); margin-left: auto; padding-left: 8px; }

    /* Text Answers / Identity Table */
    .table-container {
      width: 100%;
      overflow-x: auto;
      margin-top: 10px;
    }
    .ctg-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .ctg-table th {
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 700;
      color: var(--ouro);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--borda);
    }
    .ctg-table td {
      padding: 14px 16px;
      color: var(--texto-dim);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .ctg-table tr:last-child td { border-bottom: none; }
    
    .text-answer-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--borda);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      color: var(--texto-dim);
      font-style: italic;
    }

    /* Loader */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(201,150,44,0.2);
      border-top-color: var(--ouro);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════════════
       MODO TELÃO (AUMENTO DE FONTES PARA APRESENTAÇÃO)
       ════════════════════════════════════════════ */
    .kpi-value { font-size: 64px; }
    .kpi-label { font-size: 14px; letter-spacing: 3px; }
    .chart-q-num { font-size: 14px; }
    .chart-q-text { font-size: 26px; line-height: 1.2; }
    .legend-item { font-size: 16px; margin-bottom: 6px; }
    .legend-dot { width: 14px; height: 14px; }
    .ctg-table th, .ctg-table td { font-size: 16px; }
    .text-answer-box { font-size: 20px; padding: 16px 20px; }

    /* Responsividade Celular (Por último) */
    @media (max-width: 700px) {
      .topbar          { padding: 0 16px; }
      .hero-strip      { padding: 28px 16px 24px; }
      .kpi-row         { padding: 20px 16px 0; }
      .charts-grid     { padding: 20px 16px 40px; grid-template-columns: 1fr; }
      .kpi-value       { font-size: 42px; }
      .chart-q-text    { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div style="color:var(--ouro); font-weight:600; letter-spacing:2px; font-size:12px;">CARREGANDO DADOS...</div>
  </div>

  <nav class="topbar">
    <div class="topbar-inner">
      <span class="topbar-logo">Juven<span>Art</span> & Fest<span>Mirim</span></span>
      <div class="topbar-divider"></div>
      <span class="topbar-label">Dashboard · 2026</span>
      <div class="topbar-spacer"></div>
      <span class="last-update" id="last-update"></span>
      <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
        Atualizar
      </button>
    </div>
  </nav>

  <div class="hero-strip">
    <div class="hero-strip-inner">
      <div>
        <h1 class="hero-title">Painel de <span>Resultados</span></h1>
        <p class="hero-sub">Pesquisa de Opinião · Categorias Mirim e Juvenil</p>
      </div>
    </div>
  </div>
  <div class="hero-border"></div>

  <main class="container">
    <div id="kpis"></div>
    <div id="charts-container" class="charts-grid"></div>
  </main>


  <script>
  /* ══════════════════════════════════════════════════════════════
     CONFIGURAÇÃO (URL E ESTRUTURA DAS PERGUNTAS)
     ══════════════════════════════════════════════════════════════ */
  // URL DEVE CONTER O TOKEN DE SEGURANÇA NO FETCH ABAIXO
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBxYAkuYDhnzCppUtKXs9I72zybclILg4UQfhF3gitZUwe32pCKGzjnYsyg4-6hcIHcw/exec';

  // Configuração mapeada exatamente para as 7 questões do formulário novo
  const QUESTIONS_CONFIG = [
    { key: 'ctg_nome',   label: 'CTG',        type: 'identity' },
    { key: 'ctg_cidade', label: 'Município',  type: 'identity' },
    { key: 'ctg_regiao', label: 'Região MTG', type: 'identity' },

    { key: 'q1', label: 'O que faz esses festivais serem tão especiais?', type: 'horizontal' },
    { key: 'q2', label: 'Elemento artístico mais desafiador', type: 'horizontal' },
    { key: 'q3', label: 'O que ajuda a manter ritmo e energia?', type: 'horizontal' },
    { key: 'q4', label: 'Maior dificuldade de Harmonia de Conjunto', type: 'horizontal' },
    { key: 'q5', label: 'Incentivo ao estudo da história (1 a 5)', type: 'scale' },
    { key: 'q6', label: 'Impacto do nível técnico dentro do CTG', type: 'pie' }, 
    { key: 'q7', label: 'Sensação de pisar no palco', type: 'text' }
  ];

  // Paleta de cores vibrantes para modo escuro
  const PALETTE = [
    '#F2CD7A', '#D96877', '#6E9C7C', '#C9962C',
    '#7AB0C2', '#E2976D', '#A284B3', '#52A889',
    '#C4755C', '#84A884'
  ];

  // Variáveis globais para os gráficos
  let chartInstances = {};

  /* ══════════════════════════════════════════════════════════════
     FUNÇÃO PRINCIPAL DE BUSCA E RENDERIZAÇÃO
     ══════════════════════════════════════════════════════════════ */
  async function loadData() {
    const btn = document.getElementById('btn-refresh');
    btn.innerHTML = 'Buscando...';
    btn.style.opacity = '0.5';

    try {
      // ⚠️ Requisição com o TOKEN DE SEGURANÇA
      const res  = await fetch(APPS_SCRIPT_URL + '?action=getData&token=BasesDaTradicao2026');
      const json = await res.json();
      
      if (json.error) {
        alert('Erro de Segurança: ' + json.error);
        return;
      }

      if (!json.rows || json.rows.length === 0) {
        document.getElementById('charts-container').innerHTML = `
          <div style="grid-column: 1/-1; text-align:center; padding: 60px; color: var(--texto-muted);">
            Nenhuma resposta recebida ainda.
          </div>`;
      } else {
        renderDashboard(json.headers, json.rows);
      }
      
      const now = new Date();
      document.getElementById('last-update').innerHTML = `Atualizado às ${now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}`;

    } catch (err) {
      console.error(err);
      alert('Erro ao carregar dados. Verifique o console.');
    } finally {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
      btn.innerHTML = 'Atualizar';
      btn.style.opacity = '1';
    }
  }

  function renderDashboard(headers, rows) {
    // 1. Mapear colunas
    const colData = {};
    headers.forEach((h, idx) => { colData[h] = rows.map(r => r[idx]); });

    // 2. Cálculos para KPIs
    const total      = rows.length;
    const totalCtgs  = new Set(colData['ctg_nome'] ? colData['ctg_nome'].filter(v=>v) : []).size;
    const totalCid   = new Set(colData['ctg_cidade'] ? colData['ctg_cidade'].filter(v=>v) : []).size;
    
    // Tratamento da Data da última resposta
    const timestampArray = colData['timestamp'] || [];
    let formattedLastDate = '—';
    if (timestampArray.length > 0) {
      const rawDate = timestampArray[timestampArray.length - 1];
      const d = new Date(rawDate);
      if (!isNaN(d.getTime())) {
        formattedLastDate = d.toLocaleDateString('pt-BR') + ' às ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
      } else {
        formattedLastDate = String(rawDate).split(' ')[0];
      }
    }

    // 3. Renderizar KPIs
    document.getElementById('kpis').innerHTML = `
      <div class="kpi-row">
        <div class="kpi-card">
          <span class="kpi-icon">📩</span>
          <div class="kpi-value">${total}</div>
          <div class="kpi-label">Respostas recebidas</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">🏠</span>
          <div class="kpi-value">${totalCtgs}</div>
          <div class="kpi-label">CTGs participantes</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">📍</span>
          <div class="kpi-value">${totalCid}</div>
          <div class="kpi-label">Municípios</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-icon">🕐</span>
          <div class="kpi-value" style="font-size:24px; margin-top:16px;">${formattedLastDate}</div>
          <div class="kpi-label">Última resposta</div>
        </div>
      </div>`;

    // 4. Preparar Container de Gráficos
    const container = document.getElementById('charts-container');
    container.innerHTML = ''; 

    // Destruir gráficos anteriores
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};

    let qCount = 1;
    let identityHtml = '';

    QUESTIONS_CONFIG.forEach(cfg => {
      // Ignorar se a coluna não existir na planilha
      if (!colData[cfg.key]) return; 

      const rawAnswers = colData[cfg.key].filter(v => v !== "" && v !== undefined);

      // --- IDENTIDADE (TABELA) ---
      if (cfg.type === 'identity' && cfg.key === 'ctg_nome') {
        const nomes   = colData['ctg_nome']   || [];
        const cidades = colData['ctg_cidade'] || [];
        const regioes = colData['ctg_regiao'] || [];
        
        let trs = '';
        for(let i=0; i<nomes.length; i++){
          if(nomes[i]) {
            trs += `<tr>
                      <td>${nomes[i]}</td>
                      <td>${cidades[i] || '-'}</td>
                      <td>${regioes[i] || '-'}</td>
                    </tr>`;
          }
        }
        
        identityHtml = `
          <div class="chart-card" style="grid-column: 1/-1;">
            <div class="chart-header">
              <div class="chart-title-area">
                <div class="chart-q-num">IDENTIFICAÇÃO</div>
                <div class="chart-q-text">Entidades participantes</div>
              </div>
              <div class="chart-type-badge">TABELA</div>
            </div>
            <div class="table-container">
              <table class="ctg-table">
                <thead><tr><th>CTG</th><th>Município</th><th>Região MTG</th></tr></thead>
                <tbody>${trs}</tbody>
              </table>
            </div>
          </div>`;
        return;
      }
      if (cfg.type === 'identity') return; // Pula as outras chaves de identidade

      // --- TEXTO LIVRE ---
      if (cfg.type === 'text') {
        let textsHtml = rawAnswers.map(t => `<div class="text-answer-box">"${t}"</div>`).join('');
        if(!textsHtml) textsHtml = '<span style="color:var(--texto-muted)">Nenhuma resposta escrita ainda.</span>';
        
        const card = document.createElement('div');
        card.className = 'chart-card';
        card.style.gridColumn = '1/-1'; // Ocupa a linha toda
        card.innerHTML = `
          <div class="chart-header">
            <div class="chart-title-area">
              <div class="chart-q-num">Q ${qCount}</div>
              <div class="chart-q-text">${cfg.label}</div>
            </div>
            <div class="chart-type-badge">TEXTO</div>
          </div>
          <div class="chart-body" style="display:block; max-height:400px; overflow-y:auto;">
            ${textsHtml}
          </div>`;
        container.appendChild(card);
        qCount++;
        return;
      }

      // --- CONTAGEM PARA GRÁFICOS ---
      const counts = {};
      rawAnswers.forEach(ans => {
        // Separa checkboxes (se houver no futuro)
        const parts = String(ans).split(';'); 
        parts.forEach(p => {
          const val = p.trim();
          if (val) counts[val] = (counts[val] || 0) + 1;
        });
      });

      const labels = Object.keys(counts);
      const data   = Object.values(counts);
      if (labels.length === 0) return;

      const colors = labels.map((_, i) => PALETTE[i % PALETTE.length]);
      const canvasId = 'chart_' + cfg.key;

      // Legenda HTML para gráfico de Pizza
      let legendHtml = '';
      if (cfg.type === 'pie') {
        legendHtml = '<div class="custom-legend">';
        labels.forEach((lb, i) => {
          legendHtml += `
            <div class="legend-item">
              <div class="legend-dot" style="background:${colors[i]}"></div>
              <span>${lb}</span>
              <span class="legend-val">${data[i]}</span>
            </div>`;
        });
        legendHtml += '</div>';
      }

      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `
        <div class="chart-header">
          <div class="chart-title-area">
            <div class="chart-q-num">Q ${qCount}</div>
            <div class="chart-q-text">${cfg.label}</div>
          </div>
          <div class="chart-type-badge">${cfg.type.toUpperCase()}</div>
        </div>
        <div class="chart-body" style="${cfg.type === 'pie' ? 'flex-direction:column;' : ''}">
          <canvas id="${canvasId}"></canvas>
          ${legendHtml}
        </div>`;
      
      container.appendChild(card);
      
      // Renderizar o Chart.js
      const ctx = document.getElementById(canvasId).getContext('2d');
      let chartConfig = {};

      if (cfg.type === 'pie') {
        chartConfig = {
          type: 'doughnut',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1, borderColor: '#1E1410' }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            cutout: '50%',
            plugins: { legend: { display: false } } // Usa a legenda HTML criada acima
          }
        };
      } else if (cfg.type === 'scale' || cfg.type === 'bar') {
        chartConfig = {
          type: 'bar',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4 }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.75)', font: { size: 16 } } },
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.75)', font: { size: 16 }, stepSize: 1 } }
            }
          }
        };
      } else if (cfg.type === 'horizontal') {
        chartConfig = {
          type: 'bar',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4 }] },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.75)', font: { size: 16 }, stepSize: 1 } },
              y: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.9)', font: { size: 16 } } }
            }
          }
        };
      }

      chartInstances[canvasId] = new Chart(ctx, chartConfig);
      qCount++;
    });

    // Adiciona a tabela de Identidade como primeiro card
    if (identityHtml) {
      container.insertAdjacentHTML('afterbegin', identityHtml);
    }
  }

  // ── INICIALIZAÇÃO E PILOTO AUTOMÁTICO ──
  loadData();
  
  // Atualiza o painel sozinho a cada 30 segundos (Piloto Automático para o Telão)
  setInterval(loadData, 30000);

  </script>
</body>
</html>
